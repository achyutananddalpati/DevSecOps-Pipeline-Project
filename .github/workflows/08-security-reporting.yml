name: 08 - Security Reporting & Results Parsing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    name: Generate Unified Security Report

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Download All Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./scan-results/
          pattern: "*-results"
          merge-multiple: true

      - name: Verify Downloaded Artifacts
        run: |
          echo "📁 Checking scan-results directory:"
          ls -la ./scan-results/ || echo "Directory empty or missing"

      - name: Generate Vulnerability Artifacts (To Trigger Pipeline Break)
        run: |
          mkdir -p ./scan-results

          cat << 'EOF' > ./scan-results/zap_report.json
          {
            "site": [
              {
                "alerts": [
                  { "riskcode": "3", "name": "SQL Injection" },
                  { "riskcode": "3", "name": "Cross Site Scripting (XSS)" },
                  { "riskcode": "2", "name": "Information Disclosure" }
                ]
              }
            ]
          }
          EOF

          cat << 'EOF' > ./scan-results/nmap_report.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <nmaprun>
            <host>
              <ports>
                <port portid="22"><state state="open"/><service name="ssh"/></port>
                <port portid="80"><state state="open"/><service name="http"/></port>
              </ports>
            </host>
          </nmaprun>
          EOF

      - name: Run Report Generator
        run: |
          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/scripts/parsers"
          python3 scripts/parsers/generate_security_report.py

      - name: Upload Security Report
        id: upload-report
        uses: actions/upload-artifact@v4
        with:
          name: final-security-report
          path: security-report-*.json

      - name: Enforce Security Quality Gate (Pipeline Breaking)
        run: |
          REPORT_FILE=$(ls security-report-*.json | head -1)
          STATUS=$(grep -o '"pipeline_status": "[^"]*' $REPORT_FILE | grep -o '[^"]*$')

          if [ "$STATUS" = "FAILED" ]; then
            echo "❌ CRITICAL/HIGH VULNERABILITIES DETECTED."
            echo "🛑 BREAKING THE PIPELINE. DEPLOYMENT HALTED."                  #FAILED
            exit 1
          else
            echo "✅ Quality Gate Passed. No High vulnerabilities found."        #PASSED
          fi





      - name: Send Slack Alert on Pipeline Failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *DevSecOps Pipeline Alert* 🚨",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔴 Pipeline Failure: Critical Vulnerabilities Detected"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Workflow:*\n${{ github.workflow }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Run ID:*\n${{ github.run_id }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*High Vulnerabilities:*\n${{ steps.quality-gate.outputs.HIGH }}" },
                    { "type": "mrkdwn", "text": "*Medium Vulnerabilities:*\n${{ steps.quality-gate.outputs.MEDIUM }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "🔍 View Workflow Run on GitHub" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📊 Download & View Security Report" },
                      "url": "${{ steps.upload-report.outputs.artifact-url }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "⚠️ Pipeline halted due to security policy violation. Immediate action required."
                    }
                  ]
                }
              ]
            }
