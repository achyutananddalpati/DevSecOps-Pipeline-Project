- name: Generate Vulnerability Artifacts (To Trigger Pipeline Break)
        run: |
          mkdir -p ./scan-results

          # Simulate a failed ZAP scan with 2 High Vulnerabilities
          cat << 'EOF' > ./scan-results/zap_report.json
          {
            "site": [
              {
                "alerts": [
                  { "riskcode": "3", "name": "SQL Injection" },
                  { "riskcode": "3", "name": "Cross Site Scripting (XSS)" },
                  { "riskcode": "2", "name": "Information Disclosure" }
                ]
              }
            ]
          }
          EOF

          # Simulate an Nmap scan with open ports
          cat << 'EOF' > ./scan-results/nmap_report.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <nmaprun>
            <host>
              <ports>
                <port portid="22"><state state="open"/><service name="ssh"/></port>
                <port portid="80"><state state="open"/><service name="http"/></port>
              </ports>
            </host>
          </nmaprun>
          EOF
