name: 08 - Security Reporting & Results Parsing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    name: Generate Unified Security Report

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # =============================================
      # 1. BULLETPROOF THE DIRECTORY
      # Ensures the folder exists so the script never crashes
      # =============================================
      - name: Create Results Directory
        run: |
          mkdir -p ./scan-results/
          echo "✅ Directory ./scan-results/ created safely."

      # =============================================
      # 2. CROSS-WORKFLOW ARTIFACT DOWNLOADER
      # Reaches into Workflow 5 to grab the completed ZAP scan
      # =============================================
      - name: Download ZAP Artifacts (Cross-Workflow)
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: 05-dast-scanning.yml
          name: zap-scan-results
          path: ./scan-results/
          # 'completed' ensures it downloads even if ZAP found a High vuln and 'failed' its run
          workflow_conclusion: completed
        continue-on-error: true

      # =============================================
      # 3. RENAME THE REPORT
      # =============================================
      - name: Prepare ZAP Report for Parsing
        run: |
          echo "Looking for ZAP's default report_json.json..."

          # Find the file safely
          ZAP_FILE=$(find ./scan-results/ -name "report_json.json" 2>/dev/null | head -n 1)

          if [ -n "$ZAP_FILE" ]; then
            echo "Found ZAP report at: $ZAP_FILE"
            cp "$ZAP_FILE" ./scan-results/zap-results.json
            echo "✅ Copied to zap-results.json so the Python script can read it!"
          else
            echo "⚠️ report_json.json not found in artifacts."
          fi

          echo "Current scan-results directory contents:"
          ls -la ./scan-results/

      # =============================================
      # 4. REPORT GENERATION & ENFORCEMENT
      # =============================================
      - name: Run Report Generator
        run: |
          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}/scripts/parsers"
          python3 scripts/parsers/generate_security_report.py

      - name: Upload Security Report
        id: upload-report
        uses: actions/upload-artifact@v4
        with:
          name: final-security-report
          path: security-report-*.json

      - name: Enforce Security Quality Gate (Pipeline Breaking)
        run: |
          REPORT_FILE=$(ls security-report-*.json | head -1)
          STATUS=$(grep -o '"pipeline_status": "[^"]*' $REPORT_FILE | grep -o '[^"]*$')

          if [ "$STATUS" = "FAILED" ]; then
            echo "❌ CRITICAL/HIGH VULNERABILITIES DETECTED."
            echo "🛑 BREAKING THE PIPELINE. DEPLOYMENT HALTED."
            exit 1
          else
            echo "✅ Quality Gate Passed. No High vulnerabilities found."
          fi

      # (Slack Alerts intentionally kept identical to your configuration)
      - name: Send Slack Alert on Pipeline Failure
        if: failure()
        uses: slackapi/slack-github-action@v3.0.1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *DevSecOps Pipeline Alert* 🚨",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔴 Pipeline Failure: Critical Vulnerabilities Detected"
                  }
                }
              ]
            }

      - name: Send Slack Alert on Pipeline Success
        if: success()
        uses: slackapi/slack-github-action@v3.0.1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *DevSecOps Pipeline Alert*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Pipeline Passed: Secure Deployment Successful"
                  }
                }
              ]
            }
