name: 02 - Information Gathering with Nmap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  port-scan:
    runs-on: ubuntu-latest

    steps:
      # =============================================
      # CHECKOUT REPOSITORY (Updated to v4)
      # =============================================
      - name: Checkout repository
        uses: actions/checkout@v6

      # =============================================
      # DYNAMIC SECURITY GROUP OPENING (EPHEMERAL)
      # =============================================
      - name: Temporarily Open HTTPS Port (443) in Security Group
        uses: mnavarrocarter/authorize-aws-security-group-ingress-action@v1.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          protocol: 'tcp'
          port: 443

      # =============================================
      # NMAP SCANNING EXECUTION
      # =============================================
      - name: Display scan target
        run: |
          echo "=================================="
          echo "🔍 STARTING INFORMATION GATHERING"
          echo "=================================="
          echo "Target: ${{ secrets.AWS_SERVER_IP }}"
          echo "=================================="

      - name: Install Nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
          echo ""
          echo "Nmap version installed:"
          nmap --version

      - name: Run Nmap Port Scan
        run: |
          echo "Scanning ${{ secrets.AWS_SERVER_IP }} for open ports..."
          echo "This may take 1-2 minutes..."
          echo ""

          # Added -Pn so AWS doesn't drop the ping request
          nmap -Pn -F -sV --open ${{ secrets.AWS_SERVER_IP }} > nmap-results.txt

          echo "=== SCAN RESULTS ==="
          echo ""
          cat nmap-results.txt

          # Count open ports
          OPEN_PORTS=$(grep -c "^[0-9]\+/tcp" nmap-results.txt || echo "0")
          echo ""
          echo "✅ Scan complete. Found $OPEN_PORTS open ports."

      # =============================================
      # UPLOAD ARTIFACT (Updated to v4)
      # =============================================
      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v7
        with:
          name: nmap-scan-results
          path: nmap-results.txt

      - name: Display summary
        run: |
          echo "=================================="
          echo "📊 INFORMATION GATHERING COMPLETE"
          echo "=================================="
          echo "Check the 'Actions' tab for detailed results"
          echo "Download 'nmap-scan-results' artifact for full report"
          echo "=================================="

      - name: Check for dangerous open ports
        run: |
          echo "Checking for potentially dangerous open ports..."
          echo ""

          # Display all open ports first
          echo "Open ports detected:"
          grep -E "^[0-9]+/tcp" nmap-results.txt | awk '{print $1}' | sort || echo "No open ports found"
          echo ""

          # Define dangerous ports
          DANGEROUS_PORTS="21 23 25 139 445 3389 5900 5432 3306"

          # Check each port
          FOUND=0
          for PORT in $DANGEROUS_PORTS; do
            if grep -q "^$PORT/tcp" nmap-results.txt 2>/dev/null; then
              echo "❌ DANGEROUS: Port $PORT is OPEN - FTP/Telnet/SMB should be closed"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "✅ No dangerous ports found (ports 21,23,25,139,445,3389,5900,5432,3306 are closed)"
          fi

          echo ""
          echo "Port scan analysis complete."
