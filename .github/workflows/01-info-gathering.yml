name: 01 - Information Gathering

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # =============================================
      # CHECKOUT REPOSITORY
      # =============================================
      - name: Checkout repository
        uses: actions/checkout@v6

      # =============================================
      # DYNAMIC SECURITY GROUP OPENING (EPHEMERAL)
      # =============================================
      - name: Temporarily Open HTTPS Port in Security Group
        uses: mnavarrocarter/authorize-aws-security-group-ingress-action@v1.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          protocol: 'tcp'
          port: 443

      - name: Display server information
        run: |
          echo "=================================="
          echo "🚀 DevSecOps Pipeline Started"
          echo "=================================="
          echo "Target IP: ${{ secrets.AWS_SERVER_IP }}"
          echo "Target Domain: ${{ secrets.AWS_SERVER_DOMAIN }}"
          echo "=================================="

      - name: 🔴 CRITICAL - Server Reachability Test (Port 443)
        run: |
          echo "Checking if server is online using port 443..."
          echo "Attempting to connect to https://${{ secrets.AWS_SERVER_IP }}:443"
          echo ""

          HTTPS_CODE=$(curl -s -k -o /dev/null -w "%{http_code}" --connect-timeout 5 https://${{ secrets.AWS_SERVER_IP }} || echo "FAILED")

          echo "HTTPS Response Code: $HTTPS_CODE"
          echo ""

          if [ "$HTTPS_CODE" = "200" ]; then
            echo "✅✅ SERVER IS ONLINE - Juice Shop is running (HTTPS 200 OK)"
            echo "server_status=online" >> $GITHUB_ENV
            exit 0
          elif [ "$HTTPS_CODE" = "302" ] || [ "$HTTPS_CODE" = "301" ]; then
            echo "✅✅ SERVER IS ONLINE - Juice Shop responded with redirect (HTTPS $HTTPS_CODE)"
            echo "server_status=online" >> $GITHUB_ENV
            exit 0
          elif [ "$HTTPS_CODE" = "403" ] || [ "$HTTPS_CODE" = "401" ]; then
            echo "⚠️ SERVER IS ONLINE but requires authentication (HTTPS $HTTPS_CODE)"
            echo "server_status=online-auth" >> $GITHUB_ENV
            exit 0
          elif [ "$HTTPS_CODE" = "404" ]; then
            echo "⚠️ SERVER IS ONLINE but page not found (HTTPS 404)"
            echo "server_status=online-404" >> $GITHUB_ENV
            exit 0
          elif [ "$HTTPS_CODE" = "000" ] || [ "$HTTPS_CODE" = "FAILED" ] || [ "$HTTPS_CODE" = "" ]; then
            echo "❌❌ SERVER IS DOWN OR NOT REACHABLE"
            echo ""
            echo "🔴 CRITICAL: No response on port 443"
            echo ""
            echo "This could mean:"
            echo "  1. EC2 instance is STOPPED"
            echo "  2. Juice Shop container is not running"
            echo "  3. Security Group blocks port 443 from GitHub"
            echo "  4. AWS server has no internet route"
            echo ""
            exit 1
          else
            echo "⚠️ Server responded with unexpected code: $HTTPS_CODE"
            echo "server_status=online-unknown" >> $GITHUB_ENV
            exit 0
          fi

      - name: 🟡 Verify Juice Shop Content (Only runs if server is online)
        if: success()
        run: |
          echo "Checking if Juice Shop homepage loads properly..."
          echo ""

          curl -s -k --connect-timeout 5 https://${{ secrets.AWS_SERVER_IP }} > homepage.html

          if grep -q "Juice Shop" homepage.html || grep -q "OWASP" homepage.html || grep -q "juice" homepage.html; then
            echo "✅ Juice Shop homepage verified - found expected keywords"
            LINES=$(wc -l < homepage.html)
            echo "Homepage size: $LINES lines"
            rm homepage.html
            exit 0
          else
            echo "⚠️  Homepage loaded but doesn't look like Juice Shop"
            echo "First 10 lines of response:"
            echo "----------------------------------------"
            head -10 homepage.html
            echo "----------------------------------------"
            rm homepage.html
            exit 0
          fi

      - name: 📊 Final Status Report (Success)
        if: success()
        run: |
          echo "=================================="
          echo "✅✅✅ ALL CHECKS PASSED ✅✅✅"
          echo "=================================="
          echo "✓ Server is online and responding on port 443"
          echo "✓ Juice Shop is accessible"
          echo "=================================="

      - name: ❌ Final Status Report (Failure)
        if: failure()
        run: |
          echo "=================================="
          echo "❌❌❌ PIPELINE FAILED ❌❌❌"
          echo "=================================="
          echo "Check your AWS EC2 status and Nginx SSL configuration."
