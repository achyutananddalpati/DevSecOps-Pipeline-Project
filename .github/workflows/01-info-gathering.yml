name: 01 - Information Gathering

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Display server information from secrets
        run: |
          echo "🚀 Pipeline Started"
          echo "Target IP: ${{ secrets.AWS_SERVER_IP }}"
          echo "Target Domain: ${{ secrets.AWS_SERVER_DOMAIN }}"

      - name: Test connection to server
        run: |
          echo "Testing connection..."
          curl -s --connect-timeout 5 http://${{ secrets.AWS_SERVER_IP }} || echo "Server is not responding to HTTP (expected if Juice Shop is not running)"



