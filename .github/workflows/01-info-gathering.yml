      - name: 🔴 TEST 1 - Is Server Reachable? (Port 80 Check)
        run: |
          echo "Checking if server is online using port 80..."
          if curl -s -o /dev/null --connect-timeout 5 http://${{ secrets.AWS_SERVER_IP }}; then
            echo "✅ SERVER IS ONLINE (port 80 responded)"
          else
            echo "❌ SERVER IS NOT RESPONDING on port 80"
            echo "This could mean:"
            echo "  1. EC2 instance is stopped"
            echo "  2. Juice Shop container is not running"
            echo "  3. Security Group blocks port 80"
            exit 1
          fi
