name: 05 - DAST Scanning with OWASP ZAP

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sundays

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Display scan information
        run: |
          echo "=================================="
          echo "🛡️ DYNAMIC APPLICATION SECURITY TESTING"
          echo "=================================="
          echo "Tool: OWASP ZAP"
          echo "Target: http://${{ secrets.AWS_SERVER_IP }}"
          echo "Scan Type: Active Vulnerability Scan"
          echo "=================================="

      - name: Run OWASP ZAP Baseline Scan (Docker)
        run: |
          echo "Starting ZAP Baseline Scan using Docker..."
          echo ""

          # Run ZAP baseline scan using Docker (more reliable)
          docker run --rm -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://${{ secrets.AWS_SERVER_IP }} \
            -g gen.conf \
            -r zap-baseline-report.html \
            -w zap-baseline-report.md \
            -x zap-baseline-report.xml \
            -I || true

          echo ""
          echo "Baseline scan completed"
          ls -la zap-baseline-report* 2>/dev/null || echo "No baseline report generated"

      - name: Run ZAP Full Active Scan (Docker)
        run: |
          echo "Starting ZAP Full Active Scan using Docker..."
          echo "This performs aggressive vulnerability testing (may take 5-10 minutes)"
          echo ""

          # Run ZAP full scan using Docker
          docker run --rm -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py \
            -t http://${{ secrets.AWS_SERVER_IP }} \
            -g gen.conf \
            -r zap-full-report.html \
            -w zap-full-report.md \
            -x zap-full-report.xml \
            -I || true

          echo ""
          echo "Full active scan completed"
          ls -la zap-full-report* 2>/dev/null || echo "No full report generated"

      - name: Generate ZAP Report Summary
        run: |
          echo "=================================="
          echo "📋 ZAP SCAN SUMMARY"
          echo "=================================="
          echo ""

          # Create summary report
          echo "# OWASP ZAP Vulnerability Scan Report" > zap-summary.md
          echo "Target: http://${{ secrets.AWS_SERVER_IP }}" >> zap-summary.md
          echo "Scan Date: $(date)" >> zap-summary.md
          echo "" >> zap-summary.md

          # Extract findings from reports if they exist
          echo "## Scan Results" >> zap-summary.md
          echo "" >> zap-summary.md

          if [ -f zap-full-report.html ]; then
            echo "✅ Full active scan completed" >> zap-summary.md
            echo "" >> zap-summary.md

            # Try to extract alert counts (simplified)
            HIGH_COUNT=$(grep -c "alertHigh" zap-full-report.html 2>/dev/null || echo "0")
            MED_COUNT=$(grep -c "alertMedium" zap-full-report.html 2>/dev/null || echo "0")
            LOW_COUNT=$(grep -c "alertLow" zap-full-report.html 2>/dev/null || echo "0")
            INFO_COUNT=$(grep -c "alertInfo" zap-full-report.html 2>/dev/null || echo "0")

            echo "| Risk Level | Count |" >> zap-summary.md
            echo "|------------|-------|" >> zap-summary.md
            echo "| High | $HIGH_COUNT |" >> zap-summary.md
            echo "| Medium | $MED_COUNT |" >> zap-summary.md
            echo "| Low | $LOW_COUNT |" >> zap-summary.md
            echo "| Info | $INFO_COUNT |" >> zap-summary.md
          else
            echo "⚠️ No detailed report available" >> zap-summary.md
          fi

          echo "" >> zap-summary.md
          echo "## Notes" >> zap-summary.md
          echo "- Juice Shop is intentionally vulnerable" >> zap-summary.md
          echo "- Findings are expected for this test application" >> zap-summary.md
          echo "- See HTML reports for complete details" >> zap-summary.md

          echo ""
          echo "ZAP summary report created:"
          cat zap-summary.md

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-results
          path: |
            zap-*.html
            zap-*.md
            zap-*.xml

      - name: Final Summary
        run: |
          echo "=================================="
          echo "🛡️ DAST SCANNING COMPLETE"
          echo "=================================="
          echo ""
          echo "✅ OWASP ZAP scans executed via Docker"
          echo "📊 Reports generated and saved"
          echo ""
          echo "📁 Artifacts available for download:"
          echo "   - zap-baseline-report.html (Quick baseline scan)"
          echo "   - zap-full-report.html (Detailed active scan)"
          echo "   - zap-summary.md (Executive summary)"
          echo ""
          echo "Note: ZAP scans may show vulnerabilities - this is expected for Juice Shop"
          echo "=================================="
