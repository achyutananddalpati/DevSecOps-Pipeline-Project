name: 05 - DAST Scanning with OWASP ZAP (Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Display scan information
        run: |
          echo "=================================="
          echo "🛡️ DAST SCANNING WITH OWASP ZAP"
          echo "=================================="
          echo "Target: http://${{ secrets.AWS_SERVER_IP }}"
          echo "=================================="

      - name: Run ZAP Full Scan (Docker)
        run: |
          echo "Starting ZAP full scan using Docker..."
          echo "This will take 5-10 minutes..."

          # Run ZAP full scan using official Docker image
          docker run --rm \
            -v $(pwd):/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://${{ secrets.AWS_SERVER_IP }} \
            -r zap-report.html \
            -x zap-report.xml \
            -I || true

          echo "Scan completed"

      - name: Check for report
        run: |
          if [ -f zap-report.html ]; then
            echo "✅ Report generated: zap-report.html"
            echo "Report size: $(wc -l < zap-report.html) lines"
          else
            echo "⚠️ No report generated, creating summary"
            echo "<html><body><h1>ZAP Scan</h1>" > zap-report.html
            echo "<p>Target: http://${{ secrets.AWS_SERVER_IP }}</p>" >> zap-report.html
            echo "<p>Date: $(date)</p>" >> zap-report.html
            echo "<p>OWASP Juice Shop is intentionally vulnerable.</p>" >> zap-report.html
            echo "</body></html>" >> zap-report.html
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-results
          path: zap-report.html
