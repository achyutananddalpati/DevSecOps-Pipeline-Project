name: 05 - DAST Scanning with OWASP ZAP (Fast Test)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  issues: write
  contents: read

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    name: Scan OWASP Juice Shop

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Display Target Information
        run: |
          echo "=================================="
          echo "🛡️ OWASP ZAP DAST SCAN (FAST MOCK TEST)"
          echo "=================================="
          echo "Target: http://${{ secrets.AWS_SERVER_IP }}"
          echo "Application: OWASP Juice Shop"
          echo "=================================="

      # --- START OF MOCK TEST ---
      - name: MOCK ZAP Scan (Fast Test)
        run: |
          echo "Simulating a 30-minute ZAP scan in 2 seconds..."
          sleep 2

          # Create fake ZAP output directories and files so the artifact uploader doesn't crash
          mkdir -p zap-out
          echo "This is a fake JSON report for testing." > zap-out/report_json.json
          echo "This is a fake HTML report for testing." > zap-out/report_html.html
          echo "This is a fake Markdown report for testing." > zap-out/report_md.md

          echo "✅ Mock scan complete! Moving to report generation..."
      # --- END OF MOCK TEST ---

      - name: Create Summary Report
        run: |
          echo "# OWASP ZAP DAST Scan Results" > zap-summary.md
          echo "" >> zap-summary.md
          echo "## Scan Information" >> zap-summary.md
          echo "- **Target:** http://${{ secrets.AWS_SERVER_IP }}" >> zap-summary.md
          echo "- **Date:** $(date)" >> zap-summary.md
          echo "- **Application:** OWASP Juice Shop" >> zap-summary.md
          echo "" >> zap-summary.md

          echo "## Vulnerability Summary" >> zap-summary.md
          echo "" >> zap-summary.md
          echo "OWASP Juice Shop is intentionally vulnerable. Expected findings include:" >> zap-summary.md
          echo "" >> zap-summary.md
          echo "| Risk Level | Vulnerability Type |" >> zap-summary.md
          echo "|------------|-------------------|" >> zap-summary.md
          echo "| 🔴 **High** | SQL Injection (SQLi) |" >> zap-summary.md
          echo "| 🔴 **High** | Cross-Site Scripting (XSS) |" >> zap-summary.md
          echo "| 🔴 **High** | Broken Access Control |" >> zap-summary.md
          echo "| 🟡 **Medium** | Broken Authentication |" >> zap-summary.md
          echo "| 🟡 **Medium** | Sensitive Data Exposure |" >> zap-summary.md
          echo "| 🟡 **Medium** | Security Misconfiguration |" >> zap-summary.md
          echo "| 🟢 **Low** | Missing Security Headers |" >> zap-summary.md
          echo "| 🟢 **Low** | Information Disclosure |" >> zap-summary.md
          echo "" >> zap-summary.md

          echo "## Next Steps" >> zap-summary.md
          echo "" >> zap-summary.md
          echo "1. Review the full ZAP report in artifacts" >> zap-summary.md
          echo "2. Check the GitHub Issues tab for automatically created vulnerability tickets!" >> zap-summary.md
          echo "3. These vulnerabilities will be addressed in Chapter 6 (Remediation)" >> zap-summary.md

          cat zap-summary.md

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-results
          path: |
            zap-summary.md
            zap-out/**

      - name: Final Status
        run: |
          echo "=================================="
          echo "✅ ZAP SCAN COMPLETED SUCCESSFULLY"
          echo "=================================="
          echo "📁 Artifacts: zap-scan-results"
          echo "📊 Download and review the reports"
          echo "=================================="
