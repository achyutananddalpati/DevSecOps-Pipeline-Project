name: 05 - Automated Vulnerability Scanning (OWASP ZAP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Display scan target
        run: |
          echo "=================================="
          echo "🕷️ DYNAMIC VULNERABILITY SCAN (DAST)"
          echo "=================================="
          echo "Tool: OWASP ZAP (Zed Attack Proxy)"
          echo "Target: http://${{ secrets.AWS_SERVER_IP }}"
          echo "=================================="

      - name: Run OWASP ZAP Baseline Scan
        run: |
          echo "Pulling OWASP ZAP Docker image and initiating scan..."
          echo "This will spider the target and perform passive scanning."
          echo "This process may take 3-5 minutes..."

          # We use docker run to execute the ZAP baseline script
          # -t: target URL
          # -J: output results as JSON
          # || true prevents the pipeline from failing if ZAP finds vulnerabilities (which it will on Juice Shop!)

          docker run -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://${{ secrets.AWS_SERVER_IP }} \
            -J zap-results.json || true

          echo "✅ ZAP Scan completed. Results saved to zap-results.json"

      - name: Parse Results and Generate Markdown Report
        run: |
          echo "=================================="
          echo "📊 GENERATING VULNERABILITY REPORT"
          echo "=================================="

          echo "# 🛡️ OWASP ZAP Vulnerability Report" > zap-summary.md
          echo "Target: http://${{ secrets.AWS_SERVER_IP }}" >> zap-summary.md
          echo "Generated: $(date)" >> zap-summary.md
          echo "" >> zap-summary.md

          # Extract the total number of alerts based on risk level
          HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' zap-results.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' zap-results.json 2>/dev/null || echo "0")
          LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' zap-results.json 2>/dev/null || echo "0")

          echo "## Executive Summary" >> zap-summary.md
          echo "- **🔴 High Risk:** $HIGH" >> zap-summary.md
          echo "- **🟡 Medium Risk:** $MEDIUM" >> zap-summary.md
          echo "- **🔵 Low Risk:** $LOW" >> zap-summary.md
          echo "" >> zap-summary.md

          echo "## Detailed Findings" >> zap-summary.md
          echo "| Risk Level | Vulnerability Name | Instances |" >> zap-summary.md
          echo "|------------|--------------------|-----------|" >> zap-summary.md

          # Parse the JSON array and format it into a Markdown table
          jq -r '.site[].alerts[] | "| \(.riskdesc | split(" ") | .[0]) | \(.name) | \(.count) |"' zap-results.json >> zap-summary.md || echo "| N/A | Parsing Error or No Alerts | 0 |" >> zap-summary.md

          cat zap-summary.md

      - name: Upload Vulnerability Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-vulnerability-results
          path: |
            zap-results.json
            zap-summary.md

      - name: Final Pipeline Status
        run: |
          echo "=================================="
          echo "🕷️ VULNERABILITY SCANNING COMPLETE"
          echo "=================================="
          echo "Artifacts are ready for download."
          echo "Review the zap-summary.md for the extracted vulnerabilities."
          echo "=================================="
