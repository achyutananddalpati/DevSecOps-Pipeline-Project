name: 03 - Service Identification (Deep Version Detection)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  service-detection:
    runs-on: ubuntu-latest

    steps:
      # =============================================
      # CHECKOUT REPOSITORY (Updated to v4)
      # =============================================
      - name: Checkout repository
        uses: actions/checkout@v6

      # =============================================
      # DYNAMIC SECURITY GROUP OPENING (EPHEMERAL)
      # =============================================
      - name: Temporarily Open HTTPS Port (443) in Security Group
        uses: mnavarrocarter/authorize-aws-security-group-ingress-action@v1.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          protocol: 'tcp'
          port: 443

      # =============================================
      # SERVICE IDENTIFICATION EXECUTION
      # =============================================
      - name: Display scan target
        run: |
          echo "=================================="
          echo "🔍 SERVICE IDENTIFICATION SCAN"
          echo "=================================="
          echo "Target: ${{ secrets.AWS_SERVER_IP }}"
          echo "Scan Type: Deep Version Detection"
          echo "=================================="

      - name: Install Nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
          echo ""
          echo "Nmap version installed:"
          nmap --version

      - name: Run Deep Service Detection Scan
        run: |
          echo "Starting deep service identification scan..."
          echo "This will detect service versions..."
          echo "Scan may take 2-3 minutes..."
          echo ""

          # Added -Pn to skip pinging
          echo "Scanning with aggressive service detection..."
          nmap -Pn -sV -sC --version-intensity 9 ${{ secrets.AWS_SERVER_IP }} > nmap-service-scan.txt

          echo ""
          echo "=== DETAILED SERVICE DETECTION RESULTS ==="
          echo ""
          cat nmap-service-scan.txt

      - name: Extract and Display Service Versions
        run: |
          echo "=================================="
          echo "📋 SERVICE VERSION SUMMARY"
          echo "=================================="
          echo ""

          # Create markdown table header
          echo "| Port | Service | Version | Protocol |" > service-summary.md
          echo "|------|---------|---------|----------|" >> service-summary.md

          # Extract service information from scan results
          if grep -q "^[0-9]\+/tcp" nmap-service-scan.txt; then
            grep -E "^[0-9]+/tcp" nmap-service-scan.txt | while read line; do
              PORT=$(echo "$line" | cut -d'/' -f1)
              PROTO=$(echo "$line" | cut -d'/' -f2 | cut -d' ' -f1)
              SERVICE=$(echo "$line" | awk '{print $3}')
              VERSION=$(echo "$line" | cut -d' ' -f4- | sed 's/^ //')

              # Add to markdown table
              echo "| $PORT | $SERVICE | $VERSION | $PROTO |" >> service-summary.md

              # Also display on console
              echo "Port $PORT/tcp: $SERVICE - $VERSION"
            done
          else
            echo "No open ports found or scan failed" | tee -a service-summary.md
          fi

          echo ""
          echo "Service summary saved to service-summary.md"

          # Display the table in console
          echo ""
          echo "=== SERVICE SUMMARY TABLE ==="
          cat service-summary.md

      - name: Service Information Summary
        run: |
          echo "=================================="
          echo "💻 SERVICE INFORMATION"
          echo "=================================="
          echo ""

          echo "Based on detected service versions:"
          echo ""

          # Check for SSH
          if grep -q "ssh" nmap-service-scan.txt; then
            SSH_INFO=$(grep "ssh" nmap-service-scan.txt | grep -v "service" | head -1)
            echo "✅ SSH Service: $SSH_INFO"
          fi

          # Check for HTTP
          if grep -q "http" nmap-service-scan.txt; then
            HTTP_INFO=$(grep "http" nmap-service-scan.txt | grep -v "service" | head -1)
            echo "✅ HTTP Service: $HTTP_INFO"
          fi

          # Check for HTTPS
          if grep -q "https" nmap-service-scan.txt; then
            HTTPS_INFO=$(grep "https" nmap-service-scan.txt | grep -v "service" | head -1)
            echo "✅ HTTPS Service: $HTTPS_INFO"
          fi

          echo ""
          echo "Note: OS detection skipped (requires root privileges)"
          echo "Based on services, likely OS: Ubuntu/Debian Linux"

      - name: Check for Outdated Services
        run: |
          echo "=================================="
          echo "⚠️  OUTDATED SERVICE CHECK"
          echo "=================================="
          echo ""

          # Create outdated services report
          echo "# Outdated Service Report" > outdated-services.md
          echo "Generated: $(date)" >> outdated-services.md
          echo "Target: ${{ secrets.AWS_SERVER_IP }}" >> outdated-services.md
          echo "" >> outdated-services.md
          echo "| Service | Current Version | Risk | Recommendation |" >> outdated-services.md
          echo "|---------|-----------------|------|----------------|" >> outdated-services.md

          VULNERABLE_FOUND=0

          # Parse each service and check for outdated versions
          if grep -q "^[0-9]\+/tcp" nmap-service-scan.txt; then
            grep -E "^[0-9]+/tcp" nmap-service-scan.txt | while read line; do
              PORT=$(echo "$line" | cut -d'/' -f1)
              SERVICE=$(echo "$line" | awk '{print $3}')
              FULL_VERSION=$(echo "$line" | cut -d' ' -f4-)

              # Check OpenSSH versions
              if echo "$FULL_VERSION" | grep -q "OpenSSH"; then
                SSH_VERSION=$(echo "$FULL_VERSION" | grep -o "OpenSSH_[0-9]\.[0-9][p]*" | sed 's/OpenSSH_//' || echo "unknown")

                if [[ "$SSH_VERSION" < "7.9" ]] 2>/dev/null; then
                  echo "❌ CRITICAL: OpenSSH $SSH_VERSION is severely outdated (port $PORT)"
                  echo "| OpenSSH | $SSH_VERSION | 🔴 CRITICAL | Upgrade to OpenSSH 8.9+ immediately |" >> outdated-services.md
                  VULNERABLE_FOUND=1
                elif [[ "$SSH_VERSION" < "8.5" ]] 2>/dev/null; then
                  echo "⚠️  WARNING: OpenSSH $SSH_VERSION is outdated (port $PORT)"
                  echo "| OpenSSH | $SSH_VERSION | 🟡 MEDIUM | Upgrade to OpenSSH 8.9+ recommended |" >> outdated-services.md
                  VULNERABLE_FOUND=1
                else
                  echo "✅ OpenSSH $SSH_VERSION is current"
                fi
              fi

              # Check Apache versions
              if echo "$FULL_VERSION" | grep -q "Apache.*httpd"; then
                APACHE_VERSION=$(echo "$FULL_VERSION" | grep -o "2\.4\.[0-9]\+" || echo "unknown")
                if [[ "$APACHE_VERSION" < "2.4.50" ]] 2>/dev/null; then
                  echo "⚠️  Apache $APACHE_VERSION may have known vulnerabilities"
                  echo "| Apache | $APACHE_VERSION | 🟡 MEDIUM | Update to latest 2.4.x |" >> outdated-services.md
                fi
              fi

              # Check nginx versions
              if echo "$FULL_VERSION" | grep -q "nginx"; then
                NGINX_VERSION=$(echo "$FULL_VERSION" | grep -o "[0-9]\.[0-9]\.[0-9]\+" || echo "unknown")
                if [[ "$NGINX_VERSION" < "1.20" ]] 2>/dev/null; then
                  echo "⚠️  nginx $NGINX_VERSION is outdated"
                  echo "| nginx | $NGINX_VERSION | 🟡 MEDIUM | Upgrade to nginx 1.20+ |" >> outdated-services.md
                fi
              fi

              # Check Node.js (for Juice Shop)
              if echo "$FULL_VERSION" | grep -q "Node\.js"; then
                NODE_VERSION=$(echo "$FULL_VERSION" | grep -o "[0-9]\+\.[0-9]\+\.[0-9]\+" || echo "unknown")
                if [[ "$NODE_VERSION" < "14.0.0" ]] 2>/dev/null; then
                  echo "⚠️  Node.js $NODE_VERSION is end-of-life"
                  echo "| Node.js | $NODE_VERSION | 🔴 CRITICAL | Upgrade to Node.js 18+ |" >> outdated-services.md
                fi
              fi
            done
          fi

          echo ""
          if [ $VULNERABLE_FOUND -eq 0 ]; then
            echo "✅ No clearly outdated services detected"
            echo "✅ All services appear reasonably current" >> outdated-services.md
          else
            echo "⚠️  Some services may be outdated - review the report"
            echo "" >> outdated-services.md
            echo "**Action Required:** Review and update outdated services." >> outdated-services.md
          fi

          echo ""
          echo "Outdated service report saved to outdated-services.md"

      - name: Generate Complete Service Inventory
        run: |
          echo "# Complete Service Inventory Report" > service-inventory.md
          echo "Target: ${{ secrets.AWS_SERVER_IP }}" >> service-inventory.md
          echo "Scan Date: $(date)" >> service-inventory.md
          echo "Scan Type: Deep Service Identification" >> service-inventory.md
          echo "" >> service-inventory.md

          echo "## Executive Summary" >> service-inventory.md
          echo "" >> service-inventory.md
          TOTAL_PORTS=$(grep -c "^[0-9]\+/tcp" nmap-service-scan.txt 2>/dev/null || echo "0")
          echo "- **Total Open Ports:** $TOTAL_PORTS" >> service-inventory.md
          echo "- **Scan Method:** Version detection without OS scan" >> service-inventory.md
          echo "" >> service-inventory.md

          echo "## Detailed Service Inventory" >> service-inventory.md
          echo "" >> service-inventory.md
          echo "| Port | Service | Version | Protocol | Details |" >> service-inventory.md
          echo "|------|---------|---------|----------|---------|" >> service-inventory.md

          if [ $TOTAL_PORTS -gt 0 ]; then
            grep -E "^[0-9]+/tcp" nmap-service-scan.txt | while read line; do
              PORT=$(echo "$line" | cut -d'/' -f1)
              PROTO=$(echo "$line" | cut -d'/' -f2 | cut -d' ' -f1)
              SERVICE=$(echo "$line" | awk '{print $3}')
              VERSION=$(echo "$line" | cut -d' ' -f4- | cut -c1-50)
              echo "| $PORT | $SERVICE | $VERSION | $PROTO | Full details in raw scan |" >> service-inventory.md
            done
          else
            echo "| No open ports found | - | - | - | - |" >> service-inventory.md
          fi

          echo "" >> service-inventory.md
          echo "## Security Notes" >> service-inventory.md
          echo "" >> service-inventory.md
          echo "See 'outdated-services.md' for version-specific security recommendations." >> service-inventory.md

          echo "Service inventory report generated: service-inventory.md"

      # =============================================
      # UPLOAD ARTIFACT (Updated to v4)
      # =============================================
      - name: Upload All Scan Results
        uses: actions/upload-artifact@v7
        with:
          name: service-identification-results
          path: |
            nmap-service-scan.txt
            service-summary.md
            service-inventory.md
            outdated-services.md

      - name: Final Summary
        run: |
          echo "=================================="
          echo "📊 SERVICE IDENTIFICATION COMPLETE"
          echo "=================================="
          echo ""
          echo "✅ Open ports identified with service versions"
          echo "✅ Outdated service checks performed"
          echo "✅ Complete inventory generated"
          echo ""
          echo "📁 Artifacts available for download:"
          echo "   - nmap-service-scan.txt (Raw scan data)"
          echo "   - service-summary.md (Quick reference)"
          echo "   - service-inventory.md (Complete report)"
          echo "   - outdated-services.md (Security findings)"
          echo ""
          echo "=================================="
