name: 04 - Continuous Secret Scanning (TruffleHog)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for full scan

      - name: Display scan information
        run: |
          echo "=================================="
          echo "🔐 CONTINUOUS SECRET SCANNING"
          echo "=================================="
          echo "Tool: TruffleHog"
          echo "Scan Type: Git history and current files"
          echo "=================================="

      - name: Install TruffleHog
        run: |
          echo "Installing TruffleHog..."
          # Install using pip (Python package manager)
          python3 -m pip install --upgrade pip
          python3 -m pip install truffleHog
          echo ""
          echo "TruffleHog version installed:"
          trufflehog --version 2>/dev/null || echo "TruffleHog installed successfully"

      - name: Run TruffleHog Secret Scan
        run: |
          echo "Scanning repository for exposed secrets..."
          echo "This may take a few minutes depending on repository size..."
          echo ""
          
          # Run TruffleHog on the entire git history
          # --regex: Use regular expression detection
          # --entropy: Use entropy detection for high-entropy strings
          # --max_depth: Scan all commits
          
          trufflehog --regex --entropy --max_depth=100 . > trufflehog-results.txt 2>&1 || true
          
          echo "=== SCAN RESULTS ==="
          echo ""
          
          # Check if any secrets were found
          if grep -q "Branch: " trufflehog-results.txt 2>/dev/null; then
            echo "⚠️  POTENTIAL SECRETS FOUND!"
            echo ""
            
            # Extract and display found secrets (with redaction)
            echo "Found secrets summary:"
            grep -E "Branch:|Commit:|\-\-\-\-\-\-" trufflehog-results.txt | head -20
            
            # Save findings count
            SECRET_COUNT=$(grep -c "Branch:" trufflehog-results.txt 2>/dev/null || echo "0")
            echo "$SECRET_COUNT" > secret-count.txt
            
            echo ""
            echo "⚠️  Review the full results in the artifact."
          else
            echo "✅ No secrets detected in repository!"
            echo "0" > secret-count.txt
          fi

      - name: Generate Detailed Secret Report
        run: |
          echo "# Secret Scanning Report" > secret-report.md
          echo "Generated: $(date)" >> secret-report.md
          echo "Repository: ${{ github.repository }}" >> secret-report.md
          echo "" >> secret-report.md
          
          echo "## Scan Summary" >> secret-report.md
          echo "" >> secret-report.md
          
          SECRET_COUNT=$(cat secret-count.txt)
          
          if [ "$SECRET_COUNT" -eq "0" ]; then
            echo "✅ **NO SECRETS DETECTED**" >> secret-report.md
            echo "" >> secret-report.md
            echo "The repository passed the secret scan with no findings." >> secret-report.md
          else
            echo "⚠️ **POTENTIAL SECRETS FOUND: $SECRET_COUNT**" >> secret-report.md
            echo "" >> secret-report.md
            echo "| Branch | Commit | Finding |" >> secret-report.md
            echo "|--------|--------|---------|" >> secret-report.md
            
            # Parse findings into table (simplified)
            grep -B1 -A2 "Reason: " trufflehog-results.txt | head -30 >> secret-report.md
          fi
          
          echo "" >> secret-report.md
          echo "## Recommendations" >> secret-report.md
          echo "" >> secret-report.md
          echo "1. **If secrets are real:**" >> secret-report.md
          echo "   - Rotate/revoke exposed credentials immediately" >> secret-report.md
          echo "   - Remove secrets from git history using tools like BFG Repo-Cleaner" >> secret-report.md
          echo "   - Add secret patterns to .gitignore for future protection" >> secret-report.md
          echo "" >> secret-report.md
          echo "2. **If false positives:**" >> secret-report.md
          echo "   - Add exclusion rules to TruffleHog configuration" >> secret-report.md
          echo "   - Mark as false positive in documentation" >> secret-report.md

      - name: Check for Critical Secrets (Fail Pipeline Option)
        run: |
          echo "Checking for critical secrets that should fail the pipeline..."
          echo ""
          
          SECRET_COUNT=$(cat secret-count.txt)
          
          # Define what should fail the pipeline
          # For this project, we'll warn but not fail (you can change this)
          
          if [ "$SECRET_COUNT" -gt "0" ]; then
            echo "⚠️  WARNING: $SECRET_COUNT potential secrets found."
            echo "This is a warning only - pipeline continuing."
            echo "In production, you might want to fail the build here."
            # Uncomment next line to fail pipeline on secrets
            # exit 1
          else
            echo "✅ No secrets detected - all clear!"
          fi

      - name: Upload Secret Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: |
            trufflehog-results.txt
            secret-report.md
            secret-count.txt

      - name: Final Summary
        run: |
          echo "=================================="
          echo "🔐 SECRET SCANNING COMPLETE"
          echo "=================================="
          echo ""
          
          SECRET_COUNT=$(cat secret-count.txt)
          
          if [ "$SECRET_COUNT" -eq "0" ]; then
            echo "✅✅✅ NO SECRETS FOUND ✅✅✅"
            echo ""
            echo "Your repository is clean of exposed secrets."
          else
            echo "⚠️⚠️⚠️ $SECRET_COUNT POTENTIAL SECRETS FOUND ⚠️⚠️⚠️"
            echo ""
            echo "Please review the scan results in artifacts."
          fi
          echo ""
          echo "📁 Artifacts available for download:"
          echo "   - trufflehog-results.txt (Raw scan output)"
          echo "   - secret-report.md (Formatted report)"
          echo ""
          echo "=================================="
