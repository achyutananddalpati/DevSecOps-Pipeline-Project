# =============================================
# SONARQUBE EXCLUSIONS CONFIGURATION
# =============================================
# This file tells SonarQube which files/folders to IGNORE during SAST scanning
# SonarQube automatically reads this file when present in the root directory
# =============================================

# FORMAT GUIDE:
# -------------
# **/folder_name/**  → Exclude any folder with this name anywhere in project
# **/*.ext           → Exclude all files with this extension
# **/path/to/file    → Exclude specific file
#
# EXAMPLES:
# ---------
# **/node_modules/**     → Excludes all node_modules folders
# **/*.log               → Excludes all .log files
# **/temp/**             → Excludes any temp folder
# =============================================

sonar.exclusions=**/node_modules/**,**/tests/**,**/frontend/node_modules/**,**/exploits/**

# =============================================
# HOW TO ADD MORE EXCLUSIONS IN THE FUTURE:
# =============================================
# To exclude a new folder (e.g., "backups"):
#   1. Add a new line with: **/backups/**,
#   2. Make sure to end previous lines with a comma
#   3. The last line should NOT have a comma
#
# Example adding "tempdata" folder:
#   **/exploits/**,
#   **/tempdata/**,      ← New folder added here
#   **/__pycache__/**,
#
# =============================================
# CURRENTLY EXCLUDED FOLDERS EXPLAINED:
# =============================================
# **/node_modules/**     → JavaScript dependencies (3rd party code, not ours)
# **/tests/**            → Test files (not production code)
# **/frontend/node_modules/** → Frontend dependencies (3rd party code)
# **/exploits/**         → Exploit scripts (intentionally contain attack payloads)
# **/__pycache__/**      → Python compiled bytecode (generated, not source)
# **/*.log               → Log files (generated during runs)
# **/.git/**             → Git internal files (version control, not source)
# =============================================
